[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:outputs/coverage
markers =
    unit: Unit tests
    integration: Integration tests
    property: Property-based tests
    slow: Slow running tests

# Hypothesis settings
[pytest.ini:hypothesis]
# CI profile: faster, fewer examples
[tool:pytest.ini_options.hypothesis.profiles.ci]
max_examples = 50
database = .hypothesis/examples
derandomize = true

# Local profile: thorough testing
[tool:pytest.ini_options.hypothesis.profiles.local]
max_examples = 100
database = .hypothesis/examples
